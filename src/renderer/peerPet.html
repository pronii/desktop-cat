<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>peer pet</title>
    <link rel="stylesheet" href="./peerPet.css">
  </head>
  <body>
    <main class="peer-stage">
      <div class="peer-name" id="peerName">好友</div>
      <div class="peer-cat" id="peerCat" aria-hidden="true">
        <span class="peer-ear peer-ear-left"></span>
        <span class="peer-ear peer-ear-right"></span>
        <span class="peer-head">
          <span class="peer-eye peer-eye-left"></span>
          <span class="peer-eye peer-eye-right"></span>
          <span class="peer-nose"></span>
          <span class="peer-mouth"></span>
          <span class="peer-whisker peer-whisker-left"></span>
          <span class="peer-whisker peer-whisker-right"></span>
        </span>
        <span class="peer-body"></span>
        <span class="peer-tail"></span>
      </div>
    </main>
    <script src="./peerPet.js"></script>
  </body>
</html>
