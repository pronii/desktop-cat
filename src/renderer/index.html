<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>desktop-cat</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="stage" aria-label="Desktop cat pet">
      <button class="cat" type="button" aria-label="Pet the cat">
        <span class="ear ear-left"></span>
        <span class="ear ear-right"></span>
        <span class="head">
          <span class="face-mark face-mark-left"></span>
          <span class="face-mark face-mark-right"></span>
          <span class="eye eye-left"></span>
          <span class="eye eye-right"></span>
          <span class="cheek cheek-left"></span>
          <span class="cheek cheek-right"></span>
          <span class="nose"></span>
          <span class="mouth"></span>
          <span class="tongue"></span>
          <span class="whisker whisker-left whisker-top"></span>
          <span class="whisker whisker-left whisker-bottom"></span>
          <span class="whisker whisker-right whisker-top"></span>
          <span class="whisker whisker-right whisker-bottom"></span>
        </span>
        <span class="body">
          <span class="paw paw-left"></span>
          <span class="paw paw-right"></span>
        </span>
        <span class="tail"></span>
        <span class="happy-bubble">nya</span>
        <span class="water-bubble">该喝水啦！</span>
      </button>
      <span class="water-bowl" aria-hidden="true">
        <span class="water-surf"></span>
        <span class="water-ripple"></span>
      </span>
    </main>

    <div class="bottom-bar">
      <button
        class="water-counter"
        id="waterCounter"
        type="button"
        aria-label="今日喝水杯数"
        aria-controls="waterPanel"
        aria-expanded="false"
        title="喝水记录"
      >
        <span class="water-counter-icon">💧</span>
        <span class="water-counter-num">0</span>
      </button>

      <!-- 剪贴板按钮 -->
      <button
        class="clipboard-btn"
        id="clipboardBtn"
        type="button"
        aria-label="打开剪贴板历史"
        aria-controls="clipboardPanel"
        aria-expanded="false"
        title="剪贴板历史"
      >
        <svg width="34" height="34" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <filter id="shadow">
              <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
            </filter>
          </defs>
          <circle cx="20" cy="20" r="18" fill="#FFB6C1" filter="url(#shadow)"/>
          <rect x="11" y="10" width="18" height="22" rx="2" fill="#FFF" stroke="#333" stroke-width="1.5"/>
          <rect x="16" y="8" width="8" height="4" rx="2" fill="#87CEEB" stroke="#333" stroke-width="1.5"/>
          <line x1="14" y1="16" x2="26" y2="16" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="14" y1="20" x2="26" y2="20" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="14" y1="24" x2="22" y2="24" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- 悬浮喝水面板 -->
    <div class="water-panel" id="waterPanel">
      <div class="water-panel-header">
        <h3>💧 喝水记录</h3>
        <button class="water-panel-close" id="waterPanelClose" type="button" aria-label="关闭喝水记录">×</button>
      </div>
      <div class="water-panel-body">
        <div class="water-panel-today">
          <span class="water-panel-today-label">今日已喝</span>
          <span class="water-panel-today-count">
            <span id="waterPanelCount">0</span>
            <span class="water-panel-today-unit">杯</span>
          </span>
        </div>
        <button class="water-panel-drink-btn" id="waterPanelDrinkBtn" type="button">
          <span class="water-panel-drink-icon">🥤</span>
          <span>记录一杯</span>
        </button>
        <div class="water-panel-divider"></div>
        <div class="water-panel-row">
          <span class="water-panel-row-label">提醒</span>
          <label class="water-panel-switch">
            <input type="checkbox" id="waterPanelToggle">
            <span class="water-panel-switch-slider"></span>
          </label>
        </div>
        <div class="water-panel-row water-panel-row-column">
          <span class="water-panel-row-label">提醒间隔</span>
          <div class="water-panel-intervals" id="waterPanelIntervals">
            <button class="water-panel-interval" data-minutes="15" type="button">15分</button>
            <button class="water-panel-interval" data-minutes="30" type="button">30分</button>
            <button class="water-panel-interval" data-minutes="60" type="button">1小时</button>
            <button class="water-panel-interval" data-minutes="120" type="button">2小时</button>
          </div>
        </div>
        <div class="water-panel-last" id="waterPanelLast">尚未提醒</div>
      </div>
    </div>

    <!-- 悬浮剪贴板面板 -->
    <div class="clipboard-panel" id="clipboardPanel">
      <div class="clipboard-panel-header">
        <h3>剪贴板历史</h3>
        <button class="clipboard-panel-close" id="clipboardPanelClose" type="button" aria-label="关闭剪贴板历史">×</button>
      </div>
      <div class="clipboard-panel-actions">
        <button class="clipboard-panel-action" id="clipboardPauseBtn" type="button" aria-pressed="false">暂停</button>
        <button class="clipboard-panel-action" id="clipboardClearBtn" type="button">清空</button>
      </div>
      <div class="clipboard-panel-content" id="clipboardPanelContent">
        <!-- 内容将通过 JavaScript 动态加载 -->
      </div>
    </div>

    <script src="./petBehavior.js"></script>
    <script src="./renderer.js"></script>
    <script src="./clipboardPanel.js"></script>
    <script src="./waterPanel.js"></script>
  </body>
</html>
