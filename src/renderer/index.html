<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>desktop-cat</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="stage" aria-label="Desktop cat pet">
      <button class="cat" type="button" aria-label="Pet the cat">
        <span class="ear ear-left"></span>
        <span class="ear ear-right"></span>
        <span class="head">
          <span class="face-mark face-mark-left"></span>
          <span class="face-mark face-mark-right"></span>
          <span class="eye eye-left"></span>
          <span class="eye eye-right"></span>
          <span class="cheek cheek-left"></span>
          <span class="cheek cheek-right"></span>
          <span class="nose"></span>
          <span class="mouth"></span>
          <span class="tongue"></span>
          <span class="whisker whisker-left whisker-top"></span>
          <span class="whisker whisker-left whisker-bottom"></span>
          <span class="whisker whisker-right whisker-top"></span>
          <span class="whisker whisker-right whisker-bottom"></span>
        </span>
        <span class="body">
          <span class="paw paw-left"></span>
          <span class="paw paw-right"></span>
        </span>
        <span class="tail"></span>
        <span class="happy-bubble">nya</span>
        <span class="water-bubble">该喝水啦！</span>
      </button>
      <span class="water-bowl" aria-hidden="true">
        <span class="water-surf"></span>
        <span class="water-ripple"></span>
      </span>
    </main>

    <div class="bottom-bar">
      <button
        class="sketch-btn water-counter"
        id="waterCounter"
        type="button"
        aria-label="今日喝水杯数"
        aria-controls="waterPanel"
        aria-expanded="false"
        title="喝水记录"
      >
        <span class="sketch-btn-icon">💧</span>
        <span class="sketch-btn-text"><span class="water-counter-num">0</span>杯</span>
      </button>

      <button
        class="sketch-btn clipboard-btn"
        id="clipboardBtn"
        type="button"
        aria-label="打开剪贴板历史"
        aria-controls="clipboardPanel"
        aria-expanded="false"
        title="剪贴板历史"
      >
        <span class="sketch-btn-icon">📋</span>
        <span class="sketch-btn-text">历史</span>
      </button>
    </div>

    <!-- 悬浮喝水面板 -->
    <div class="water-panel sketch-panel" id="waterPanel">
      <div class="sketch-panel-header sketch-panel-header-water">
        <h3>💧 喝水记录</h3>
        <button class="sketch-panel-close" id="waterPanelClose" type="button" aria-label="关闭喝水记录">×</button>
      </div>
      <div class="water-panel-body">
        <div class="water-progress-ring" id="waterProgressRing">
          <div class="water-progress-fill"></div>
          <div class="water-progress-inner">
            <span class="water-progress-num" id="waterPanelCount">0</span>
            <span class="water-progress-goal">/10杯</span>
          </div>
        </div>
        <div class="water-panel-actions">
          <button class="sketch-action-btn" id="waterPanelDrinkBtn" type="button">
            <span>🥤</span> 记录一杯
          </button>
          <div class="water-panel-row">
            <span class="water-panel-row-label">提醒</span>
            <label class="sketch-switch">
              <input type="checkbox" id="waterPanelToggle">
              <span class="sketch-switch-slider"></span>
            </label>
          </div>
          <div class="water-panel-row water-panel-row-column">
            <span class="water-panel-row-label">提醒间隔</span>
            <div class="water-panel-intervals" id="waterPanelIntervals">
              <button class="sketch-interval" data-minutes="0.083" type="button">5秒</button>
              <button class="sketch-interval" data-minutes="15" type="button">15m</button>
              <button class="sketch-interval" data-minutes="30" type="button">30m</button>
              <button class="sketch-interval" data-minutes="60" type="button">1h</button>
              <button class="sketch-interval" data-minutes="120" type="button">2h</button>
            </div>
          </div>
          <div class="water-panel-footer">
            <div class="water-panel-last" id="waterPanelLast">尚未提醒</div>
            <div class="water-panel-next" id="waterPanelNext">⏰ 等待提醒</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 悬浮剪贴板面板 -->
    <div class="clipboard-panel sketch-panel" id="clipboardPanel">
      <div class="clipboard-panel-header sketch-panel-header sketch-panel-header-clipboard">
        <h3>剪贴板历史</h3>
        <button class="clipboard-panel-close" id="clipboardPanelClose" type="button" aria-label="关闭剪贴板历史">×</button>
      </div>
      <div class="clipboard-panel-actions">
        <button class="clipboard-panel-action" id="clipboardPauseBtn" type="button" aria-pressed="false">暂停</button>
        <button class="clipboard-panel-action" id="clipboardClearBtn" type="button">清空</button>
      </div>
      <div class="clipboard-panel-content" id="clipboardPanelContent">
        <!-- 内容将通过 JavaScript 动态加载 -->
      </div>
    </div>

    <script src="./petBehavior.js"></script>
    <script src="./renderer.js"></script>
    <script src="./clipboardPanel.js"></script>
    <script src="./waterPanel.js"></script>
  </body>
</html>
