<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>desktop-cat</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="stage" aria-label="Desktop cat pet">
      <div class="drag-handle" aria-label="Drag desktop cat">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <button class="cat" type="button" aria-label="Pet the cat">
        <span class="ear ear-left"></span>
        <span class="ear ear-right"></span>
        <span class="head">
          <span class="face-mark face-mark-left"></span>
          <span class="face-mark face-mark-right"></span>
          <span class="eye eye-left"></span>
          <span class="eye eye-right"></span>
          <span class="cheek cheek-left"></span>
          <span class="cheek cheek-right"></span>
          <span class="nose"></span>
          <span class="mouth"></span>
          <span class="whisker whisker-left whisker-top"></span>
          <span class="whisker whisker-left whisker-bottom"></span>
          <span class="whisker whisker-right whisker-top"></span>
          <span class="whisker whisker-right whisker-bottom"></span>
        </span>
        <span class="body">
          <span class="paw paw-left"></span>
          <span class="paw paw-right"></span>
        </span>
        <span class="tail"></span>
        <span class="happy-bubble">nya</span>
      </button>
    </main>
    <script src="./petBehavior.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
