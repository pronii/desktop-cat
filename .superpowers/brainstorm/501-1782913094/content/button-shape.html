<h2>按钮的形态，你更喜欢哪种？</h2>
<p class="subtitle">底部两个按钮（💧 喝水 / 📋 剪贴板）的视觉形态</p>

<div class="cards">
  <div class="card" data-choice="round-badge" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#fff8ec; padding:16px; display:flex; align-items:center; justify-content:center;">
      <div style="display:flex; gap:14px; align-items:center;">
        <div style="width:52px;height:52px;border-radius:50%;background:#fff;border:2.5px solid #8b6f47;box-shadow:0 4px 0 #8b6f47;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;line-height:1;gap:1px;">
          <span>💧</span>
          <span style="font-size:9px;color:#8b6f47;font-weight:700;">8</span>
        </div>
        <div style="width:52px;height:52px;border-radius:50%;background:#fff;border:2.5px solid #8b6f47;box-shadow:0 4px 0 #8b6f47;display:flex;align-items:center;justify-content:center;font-size:18px;">
          <span>📋</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 圆形徽章</h3>
      <p>纯圆形，像勋章/图标，喝水按钮内含数字，紧凑圆润</p>
    </div>
  </div>

  <div class="card" data-choice="rounded-square" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#fff8ec; padding:16px; display:flex; align-items:center; justify-content:center;">
      <div style="display:flex; gap:14px; align-items:center;">
        <div style="width:52px;height:52px;border-radius:14px;background:#fff;border:2.5px solid #8b6f47;box-shadow:0 4px 0 #8b6f47;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;line-height:1;gap:1px;">
          <span>💧</span>
          <span style="font-size:9px;color:#8b6f47;font-weight:700;">8</span>
        </div>
        <div style="width:52px;height:52px;border-radius:14px;background:#fff;border:2.5px solid #8b6f47;box-shadow:0 4px 0 #8b6f47;display:flex;align-items:center;justify-content:center;font-size:18px;">
          <span>📋</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 圆角方块</h3>
      <p>圆角矩形（14px），比圆形更稳，喝水按钮内含数字</p>
    </div>
  </div>

  <div class="card" data-choice="tag-label" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#fff8ec; padding:16px; display:flex; align-items:center; justify-content:center;">
      <div style="display:flex; gap:10px; align-items:center;">
        <div style="height:44px;padding:0 14px;border-radius:22px;background:#fff;border:2.5px solid #8b6f47;box-shadow:0 4px 0 #8b6f47;display:flex;align-items:center;gap:6px;font-size:16px;">
          <span>💧</span>
          <span style="font-size:12px;color:#8b6f47;font-weight:700;">8杯</span>
        </div>
        <div style="height:44px;padding:0 14px;border-radius:22px;background:#fff;border:2.5px solid #8b6f47;box-shadow:0 4px 0 #8b6f47;display:flex;align-items:center;gap:6px;font-size:16px;">
          <span>📋</span>
          <span style="font-size:12px;color:#8b6f47;font-weight:700;">历史</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 胶囊标签</h3>
      <p>横向胶囊形，图标+文字组合，信息更明确</p>
    </div>
  </div>
</div>
